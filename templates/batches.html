{% extends "base.html" %}
{% block title %}Batches{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>Batches</h2>

    <!-- Add Batch Form -->
    <form action="{{ url_for('add_batch') }}" method="POST" class="row g-3 mb-4">
        <div class="col-md-3">
            <input type="text" name="bid" class="form-control" placeholder="Batch ID" required>
        </div>
        <div class="col-md-3">
            <input type="number" name="fees" class="form-control" placeholder="Fees" min="0" step="0.01">
        </div>
        <div class="col-md-4">
            <input type="text" name="location" class="form-control" placeholder="Location" required>
        </div>
        <div class="col-md-2 d-grid">
            <button type="submit" class="btn btn-primary">Add Batch</button>
        </div>
    </form>

    <!-- Batches Table -->
    <table class="table table-striped table-hover align-middle">
        <thead class="table-dark">
            <tr>
                <th>Batch ID</th>
                <th>Fees</th>
                <th>Location</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for batch in batches %}
            <tr>
                <td>{{ batch.bid }}</td>
                <td>{{ "%.2f"|format(batch.fees) }}</td>
                <td>{{ batch.location }}</td>
                <td>
                    <form action="{{ url_for('delete_batch', batch_id=batch.bid) }}" method="POST" onsubmit="return confirm('Delete this batch? This will also delete related students, coaches, etc.');">
                        <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                    </form>

                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="4" class="text-center">No batches found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
